<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SamF111 Foundry VTT Modules</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <header class="hero">
      <h1>SamF111 Foundry VTT Modules</h1>
      <p>
        A central hub for my Foundry Virtual Tabletop modules, including manifest links,
        release downloads, compatibility information, and repository links.
      </p>
    </header>

    <section class="module-grid" id="module-grid" aria-label="Foundry VTT modules">
      <article class="loading-card">
        <h2>Loading modules</h2>
        <p>Reading module manifests.</p>
      </article>
    </section>

    <noscript>
      <section class="noscript-warning">
        <h2>JavaScript required</h2>
        <p>
          This hub reads live module manifests from GitHub releases.
          Enable JavaScript to view module version and download information.
        </p>
      </section>
    </noscript>
  </main>

  <script src="scripts/app.js"></script>
</body>
</html>
